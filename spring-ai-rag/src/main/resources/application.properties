spring.application.name=spring_ai-elasticsearch-vector-search

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

spring.elasticsearch.uris=http://localhost:9200
spring.elasticsearch.username=elastic
spring.elasticsearch.password=${ELASTICSEARCH_PASSWORD}
spring.ai.vectorstore.elasticsearch.initialize-schema=true
spring.ai.vectorstore.elasticsearch.dimensions=768

management.endpoints.web.exposure.include=*

# Docling microservice
docling.service.url=http://localhost:8001

# Summary service
# Indice Elasticsearch per la persistenza dei documenti normalizzati
summary.document-store-index=document-store
# Indice Elasticsearch per i summary generati
summary.index-name=summary-index
# Sotto questa soglia (in caratteri) si usa la strategia Stuffing; sopra, Map-Reduce
summary.stuffing-threshold-chars=6000
# Soglia per il fallback Refine su singola sezione (in caratteri)
summary.section-refine-threshold-chars=3000

# Log livello DEBUG per vedere i JSON completi di Docling e UnifiedDocumentJson
logging.level.elastic.rag.docling.DoclingController=DEBUG
logging.file.name=elastic-vector-demo.log
