# Provider: LiteLLM (proxy OpenAI-compatibile locale su porta 4000)
# Avvia prima il proxy: cd litellm && docker compose up -d
# Poi lancia l'app con: -Dspring.profiles.active=litellm
spring.ai.openai.base-url=http://localhost:4000
spring.ai.openai.api-key=${LITELLM_MASTER_KEY:sk-litellm-master-key-change-me}
#spring.ai.openai.chat.options.model=cerebras-gpt-oss-120b
spring.ai.openai.chat.options.model=openrouter-nemotron-nano
# Altri modelli disponibili nel proxy:
# cerebras-llama-scout | openrouter-claude | openrouter-gpt4o | openrouter-llama | openrouter-nemotron-nano | gpt-4o | ollama-gemma
spring.ai.openai.chat.options.temperature=1.0

# Embedding: rimane su Ollama locale (LiteLLM non ha modelli di embedding configurati)
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.embedding.model=nomic-embed-text

# Disabilita chat Ollama ed embedding OpenAI (chat=LiteLLM, embedding=Ollama)
spring.autoconfigure.exclude=org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
