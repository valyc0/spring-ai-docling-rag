# Provider: Ollama (locale)
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.2:3b
spring.ai.ollama.chat.options.num-ctx=4096
spring.ai.ollama.embedding.model=nomic-embed-text

# Disabilita OpenAI (chat ed embedding); chiave dummy per silenziare gli altri bean OpenAI (Audio, Image, ecc.)
spring.ai.openai.api-key=noop
spring.autoconfigure.exclude=org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
