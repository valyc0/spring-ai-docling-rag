services:
  docling-service:
    build:
      context: ./docling-service
    ports:
      - "8001:8001"
    environment:
      DOCLING_THREADS: "${DOCLING_THREADS:-4}"
      DOCLING_MAX_CONCURRENT: "${DOCLING_MAX_CONCURRENT:-2}"
      DOCLING_TIMEOUT_SEC: "${DOCLING_TIMEOUT_SEC:-600}"
      DOCLING_MAX_FILE_MB: "${DOCLING_MAX_FILE_MB:-100}"
      DOCLING_DEVICE: "${DOCLING_DEVICE:-cpu}"
    restart: unless-stopped
